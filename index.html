<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azure VM Price Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    color: #1a1a2e;
    background: #fff;
    overflow: hidden;
  }
  body { padding: 10px 14px 8px; }

  .header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .header h2 { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .header .sub { font-size: 10px; color: #6b7280; }

  .top { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; }
  .top .ctrl { display: flex; flex-direction: column; gap: 2px; }
  .top .ctrl label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: #6b7280;
  }
  .top input, .top select {
    padding: 4px 6px; font-size: 13px;
    border: 1px solid #d1d5db; border-radius: 5px;
    background: #fff; color: #1a1a2e; outline: none;
    width: 90px;
  }
  .top select { width: 145px; }
  .top input:focus, .top select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.10);
  }

  .vm-line {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
    padding: 5px 10px;
    background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px;
  }
  .vm-line .name { font-weight: 700; color: #1d4ed8; font-size: 14px; }
  .vm-line .specs { font-size: 11px; color: #3b82f6; }

  .prices {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .p-card {
    background: #f3f4f6; border-radius: 6px;
    padding: 7px 9px;
  }
  .p-card.hi { background: #eff6ff; border: 1.5px solid #2563eb; }
  .p-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; color: #6b7280; margin-bottom: 2px;
  }
  .p-card.hi .p-label { color: #2563eb; }
  .p-val { font-size: 16px; font-weight: 700; color: #1a1a2e; line-height: 1.15; }
  .p-card.hi .p-val { color: #1d4ed8; }
  .p-per { font-size: 9px; color: #9ca3af; }
  .p-card.hi .p-per { color: #3b82f6; }
  .p-sv { font-size: 9px; color: #16a34a; font-weight: 600; margin-top: 1px; }

  .no-match {
    background: #fef9c3; border: 1px solid #fde047;
    border-radius: 6px; padding: 7px 10px;
    font-size: 12px; color: #854d0e;
  }

  .foot { font-size: 9px; color: #b0b0b0; margin-top: 6px; }

  @media (max-width: 420px) {
    .prices { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h2>Azure VM Price Calculator</h2>
  <span class="sub">Easv5 &middot; Ubuntu &middot; West Europe &middot; EUR</span>
</div>

<div class="top">
  <div class="ctrl">
    <label>vCPU min</label>
    <input type="number" id="cpu" min="1" max="64" value="4" oninput="calc()" />
  </div>
  <div class="ctrl">
    <label>RAM GiB min</label>
    <input type="number" id="ram" min="1" max="512" value="16" oninput="calc()" />
  </div>
  <div class="ctrl">
    <label>Pricing</label>
    <select id="mdl" onchange="calc()">
      <option value="payg">Pay as you go</option>
      <option value="r1y">1 yr reserved</option>
      <option value="r3y" selected>3 yr reserved</option>
      <option value="spot">Spot</option>
    </select>
  </div>
</div>

<div id="out"></div>

<div class="foot">Prices net EUR &middot; Azure Easv5-series, Ubuntu, West Europe, Mar 2025 &middot; 1 USD = 0.86 EUR</div>

<script>
const D=[
  {n:"E2as v5",c:2,r:16,payg:85.7425,r1y:50.583,r3y:32.5789,spot:17.4658},
  {n:"E4as v5",c:4,r:32,payg:171.4849,r1y:101.166,r3y:65.1578,spot:34.9316},
  {n:"E8as v5",c:8,r:64,payg:342.9698,r1y:202.332,r3y:130.3393,spot:69.8632},
  {n:"E16as v5",c:16,r:128,payg:685.9396,r1y:404.7354,r3y:260.6548,spot:139.7258},
];
const L={payg:"PAYG",r1y:"1yr res.",r3y:"3yr res.",spot:"Spot"};
const f=n=>"\u20ac"+n.toFixed(2);
const sv=(a,b)=>Math.round((1-b/a)*100);

function calc(){
  const cpu=parseInt(document.getElementById("cpu").value)||1;
  const ram=parseInt(document.getElementById("ram").value)||1;
  const m=document.getElementById("mdl").value;
  const vm=D.find(v=>v.c>=cpu&&v.r>=ram);
  const o=document.getElementById("out");

  if(!vm){o.innerHTML='<div class="no-match">No match in Easv5 — consider E32as v5 or higher.</div>';return;}

  const mo=vm[m], yr=mo*12, dy=mo/30;
  const s=m!=="payg"?sv(vm.payg,mo):null;

  let c4;
  if(m!=="payg"){
    c4=`<div class="p-card"><div class="p-label">PAYG equiv.</div><div class="p-val">${f(vm.payg)}<span class="p-per">/mo</span></div></div>`;
  } else {
    c4=`<div class="p-card"><div class="p-label">Hourly</div><div class="p-val">${f(mo/730)}<span class="p-per">/hr</span></div></div>`;
  }

  o.innerHTML=`
    <div class="vm-line">
      <span class="name">${vm.n}</span>
      <span class="specs">${vm.c} vCPU &middot; ${vm.r} GiB &middot; ${L[m]}</span>
    </div>
    <div class="prices">
      <div class="p-card hi">
        <div class="p-label">Monthly</div>
        <div class="p-val">${f(mo)}<span class="p-per">/mo</span></div>
        ${s?`<div class="p-sv">-${s}% vs PAYG</div>`:""}
      </div>
      <div class="p-card">
        <div class="p-label">Yearly</div>
        <div class="p-val">${f(yr)}<span class="p-per">/yr</span></div>
      </div>
      <div class="p-card">
        <div class="p-label">Daily</div>
        <div class="p-val">${f(dy)}<span class="p-per">/day</span></div>
      </div>
      ${c4}
    </div>`;
}
calc();
</script>
</body>
</html>
