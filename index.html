<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azure VM Price Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    color: #1a1a2e;
    background: #ffffff;
    /* No fixed height — let content dictate */
    overflow: visible;
  }

  body { padding: 16px 18px 10px; }

  h2 { font-size: 17px; font-weight: 600; margin-bottom: 2px; color: #1a1a2e; }
  .subtitle { font-size: 11px; color: #6b7280; margin-bottom: 12px; }

  .section {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px 14px 12px;
    margin-bottom: 12px;
  }

  .section h3 {
    font-size: 11px; font-weight: 600; color: #374151;
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em;
  }

  .controls-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }

  .ctrl { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 100px; }

  .ctrl label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: #6b7280;
  }

  input[type=number], select {
    padding: 6px 8px; font-size: 13px;
    border: 1px solid #d1d5db; border-radius: 6px;
    background: #fff; color: #1a1a2e; width: 100%; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type=number]:focus, select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  .hint { font-size: 10px; color: #9ca3af; margin-top: 6px; }

  .results { margin-bottom: 10px; }

  .vm-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #eff6ff; border: 1px solid #bfdbfe;
    border-radius: 7px; padding: 6px 12px; margin-bottom: 10px;
  }

  .vm-badge .vm-name { font-size: 14px; font-weight: 700; color: #1d4ed8; }
  .vm-badge .vm-specs { font-size: 11px; color: #3b82f6; }

  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .card {
    background: #f3f4f6;
    border-radius: 8px;
    padding: 10px 12px;
    position: relative;
  }

  .card.primary { background: #eff6ff; border: 1.5px solid #2563eb; }

  .badge {
    position: absolute; top: -8px; left: 8px;
    font-size: 9px; font-weight: 600;
    background: #2563eb; color: #fff;
    padding: 1px 6px; border-radius: 20px;
  }

  .card-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: #6b7280; margin-bottom: 4px;
  }

  .card.primary .card-label { color: #2563eb; }

  .card-price { font-size: 17px; font-weight: 700; color: #1a1a2e; line-height: 1.1; }
  .card.primary .card-price { color: #1d4ed8; }

  .card-period { font-size: 10px; color: #9ca3af; margin-left: 1px; }
  .card.primary .card-period { color: #3b82f6; }

  .card-savings { font-size: 10px; color: #16a34a; margin-top: 2px; font-weight: 500; }
  .card.primary .card-savings { color: #2563eb; }

  .no-match {
    background: #fef9c3; border: 1px solid #fde047;
    border-radius: 7px; padding: 8px 12px;
    font-size: 12px; color: #854d0e;
  }

  .footer-note { font-size: 10px; color: #9ca3af; margin-top: 8px; }

  @media (max-width: 500px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<h2>Azure VM Price Calculator</h2>
<p class="subtitle">Easv5-series &middot; Ubuntu &middot; West Europe &middot; EUR (1 USD = 0.86 EUR)</p>

<div class="section">
  <h3>Select your requirements</h3>
  <div class="controls-row">
    <div class="ctrl">
      <label>vCPU (min)</label>
      <input type="number" id="cpu-input" min="1" max="64" value="4" oninput="calculate()" />
    </div>
    <div class="ctrl">
      <label>RAM GiB (min)</label>
      <input type="number" id="ram-input" min="1" max="512" value="16" oninput="calculate()" />
    </div>
    <div class="ctrl">
      <label>Pricing model</label>
      <select id="model-select" onchange="calculate()">
        <option value="payg">Pay as you go</option>
        <option value="r1y">1 year reserved</option>
        <option value="r3y" selected>3 years reserved</option>
        <option value="spot">Spot</option>
      </select>
    </div>
  </div>
  <p class="hint">Results update automatically as you change the values above.</p>
</div>

<div class="results" id="output"></div>

<p class="footer-note">All prices are net EUR &middot; Data: Azure pricing (Easv5-series, Ubuntu, West Europe, March 2025)</p>

<script>
const VMs = [
  { name: "E2as v5",  vcpu: 2,  ram: 16,  payg: 85.7425,  r1y: 50.5830,  r3y: 32.5789,  spot: 17.4658 },
  { name: "E4as v5",  vcpu: 4,  ram: 32,  payg: 171.4849, r1y: 101.1660, r3y: 65.1578,  spot: 34.9316 },
  { name: "E8as v5",  vcpu: 8,  ram: 64,  payg: 342.9698, r1y: 202.3320, r3y: 130.3393, spot: 69.8632 },
  { name: "E16as v5", vcpu: 16, ram: 128, payg: 685.9396, r1y: 404.7354, r3y: 260.6548, spot: 139.7258 },
];

const modelLabel = {
  payg: "Pay as you go",
  r1y: "1 yr reserved (~41% savings)",
  r3y: "3 yr reserved (~62% savings)",
  spot: "Spot (~79% savings)"
};

function fmt(n) { return "\u20ac" + n.toFixed(2); }
function pct(payg, price) { return Math.round((1 - price / payg) * 100); }

/* ── Auto-resize: tell the parent iframe how tall we are ── */
function notifyParentHeight() {
  const h = document.documentElement.scrollHeight;
  // Method 1: postMessage (works cross-origin)
  try { window.parent.postMessage({ type: 'resize-iframe', height: h }, '*'); } catch(e) {}
  // Method 2: Confluence-specific — try to resize the iframe directly
  try {
    if (window.frameElement) {
      window.frameElement.style.height = h + 'px';
    }
  } catch(e) {}
}

function calculate() {
  const cpu = parseInt(document.getElementById("cpu-input").value) || 1;
  const ram = parseInt(document.getElementById("ram-input").value) || 1;
  const model = document.getElementById("model-select").value;
  const match = VMs.find(v => v.vcpu >= cpu && v.ram >= ram);
  const out = document.getElementById("output");

  if (!match) {
    out.innerHTML = `<div class="no-match">No VM found in Easv5-series matching your requirements. Consider E32as v5 or a higher series.</div>`;
    requestAnimationFrame(notifyParentHeight);
    return;
  }

  const monthly = match[model];
  const yearly  = monthly * 12;
  const daily   = monthly / 30;
  const sv      = model !== "payg" ? pct(match.payg, monthly) : null;

  out.innerHTML = `
    <div class="vm-badge">
      <span class="vm-name">${match.name}</span>
      <span class="vm-specs">${match.vcpu} vCPU &middot; ${match.ram} GiB RAM &middot; ${modelLabel[model]}</span>
    </div>
    <div class="cards">
      <div class="card primary">
        <div class="badge">selected</div>
        <div class="card-label">Monthly</div>
        <div class="card-price">${fmt(monthly)}<span class="card-period">/mo</span></div>
        ${sv ? `<div class="card-savings">~${sv}% vs PAYG</div>` : ""}
      </div>
      <div class="card">
        <div class="card-label">Yearly</div>
        <div class="card-price">${fmt(yearly)}<span class="card-period">/yr</span></div>
      </div>
      <div class="card">
        <div class="card-label">Daily</div>
        <div class="card-price">${fmt(daily)}<span class="card-period">/day</span></div>
      </div>
      ${model !== "payg" ? `
      <div class="card">
        <div class="card-label">PAYG comparison</div>
        <div class="card-price">${fmt(match.payg)}<span class="card-period">/mo</span></div>
      </div>` : `
      <div class="card">
        <div class="card-label">Hourly</div>
        <div class="card-price">${fmt(monthly/730)}<span class="card-period">/hr</span></div>
      </div>`}
    </div>
  `;

  requestAnimationFrame(notifyParentHeight);
}

calculate();
// Also notify on load
window.addEventListener('load', notifyParentHeight);
window.addEventListener('resize', notifyParentHeight);
</script>
</body>
</html>
