<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azure VM Price Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    color: #1a1a2e;
    background: #ffffff;
    padding: 20px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #1a1a2e;
  }

  .subtitle {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 20px;
  }

  .section {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .section h3 {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 12px;
  }

  .controls-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 110px;
  }

  .ctrl label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
  }

  input[type=number], select {
    padding: 8px 10px;
    font-size: 14px;
    border: 1px solid #d1d5db;
    border-radius: 7px;
    background: #ffffff;
    color: #1a1a2e;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type=number]:focus, select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  button {
    padding: 8px 20px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    height: 38px;
    white-space: nowrap;
    transition: background 0.15s;
  }

  button:hover { background: #1d4ed8; }
  button:active { background: #1e40af; }

  .hint {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 8px;
  }

  .vm-info {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }

  .vm-info-item .lbl {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
    margin-bottom: 2px;
  }

  .vm-info-item .val {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .card {
    background: #f3f4f6;
    border-radius: 9px;
    padding: 14px;
    position: relative;
  }

  .card.primary {
    background: #eff6ff;
    border: 1.5px solid #2563eb;
  }

  .badge {
    position: absolute;
    top: -10px;
    left: 12px;
    font-size: 10px;
    font-weight: 600;
    background: #2563eb;
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .card .card-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    margin-bottom: 5px;
  }

  .card.primary .card-label { color: #2563eb; }

  .card .card-price {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.1;
  }

  .card.primary .card-price { color: #1d4ed8; }

  .card .card-period {
    font-size: 12px;
    color: #9ca3af;
    margin-left: 2px;
  }

  .card.primary .card-period { color: #3b82f6; }

  .card .card-savings {
    font-size: 11px;
    color: #16a34a;
    margin-top: 4px;
    font-weight: 500;
  }

  .card.primary .card-savings { color: #2563eb; }

  .divider {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 12px 0;
  }

  .footer-note {
    font-size: 11px;
    color: #9ca3af;
  }

  .no-match {
    font-size: 13px;
    color: #6b7280;
    padding: 8px 0;
  }
</style>
</head>
<body>

<h2>Azure VM Price Calculator</h2>
<p class="subtitle">Easv5-series &middot; Ubuntu &middot; West Europe &middot; EUR (1 USD = 0.86 EUR)</p>

<div class="section">
  <h3>Select your requirements</h3>
  <div class="controls-row">
    <div class="ctrl">
      <label>vCPU (min)</label>
      <input type="number" id="cpu-input" min="1" max="64" value="4" />
    </div>
    <div class="ctrl">
      <label>RAM GiB (min)</label>
      <input type="number" id="ram-input" min="1" max="512" value="16" />
    </div>
    <div class="ctrl">
      <label>Pricing model</label>
      <select id="model-select">
        <option value="payg">Pay as you go</option>
        <option value="r1y">1 year reserved</option>
        <option value="r3y" selected>3 years reserved</option>
        <option value="spot">Spot</option>
      </select>
    </div>
    <button onclick="calculate()">Calculate</button>
  </div>
  <p class="hint">The calculator will select the smallest VM that meets your requirements.</p>
</div>

<div id="output"></div>

<script>
const VMs = [
  { name: "E2as v5",  vcpu: 2,  ram: 16,  payg: 85.7425,  r1y: 50.5830,  r3y: 32.5789,  spot: 17.4658 },
  { name: "E4as v5",  vcpu: 4,  ram: 32,  payg: 171.4849, r1y: 101.1660, r3y: 65.1578,  spot: 34.9316 },
  { name: "E8as v5",  vcpu: 8,  ram: 64,  payg: 342.9698, r1y: 202.3320, r3y: 130.3393, spot: 69.8632 },
  { name: "E16as v5", vcpu: 16, ram: 128, payg: 685.9396, r1y: 404.7354, r3y: 260.6548, spot: 139.7258 },
];

const modelLabel = {
  payg: "Pay as you go",
  r1y: "1 year reserved (~41% savings)",
  r3y: "3 years reserved (~62% savings)",
  spot: "Spot (~79% savings)"
};

function fmt(n) { return "\u20ac" + n.toFixed(2); }
function savings(payg, price) { return Math.round((1 - price / payg) * 100); }

function sendHeight() {
  const h = document.body.scrollHeight;
  window.parent.postMessage({ type: "resize", height: h }, "*");
}

function calculate() {
  const cpu = parseInt(document.getElementById("cpu-input").value) || 1;
  const ram = parseInt(document.getElementById("ram-input").value) || 1;
  const model = document.getElementById("model-select").value;
  const match = VMs.find(v => v.vcpu >= cpu && v.ram >= ram);
  const out = document.getElementById("output");

  if (!match) {
    out.innerHTML = '<p class="no-match">No VM found matching your requirements in the Easv5 series. Consider E32as v5 or higher.</p>';
    setTimeout(sendHeight, 50);
    return;
  }

  const monthly = match[model];
  const yearly = monthly * 12;
  const daily = monthly / 30;
  const sv = model !== "payg" ? savings(match.payg, monthly) : null;

  out.innerHTML = `
    <div class="vm-info">
      <div class="vm-info-item"><div class="lbl">VM</div><div class="val">${match.name}</div></div>
      <div class="vm-info-item"><div class="lbl">vCPU</div><div class="val">${match.vcpu}</div></div>
      <div class="vm-info-item"><div class="lbl">RAM</div><div class="val">${match.ram} GiB</div></div>
      <div class="vm-info-item"><div class="lbl">Temp storage</div><div class="val">0 GiB</div></div>
      <div class="vm-info-item"><div class="lbl">Pricing model</div><div class="val">${modelLabel[model]}</div></div>
    </div>
    <div class="cards">
      <div class="card primary">
        <div class="badge">selected</div>
        <div class="card-label">Monthly</div>
        <div class="card-price">${fmt(monthly)}<span class="card-period">/mo</span></div>
        ${sv ? `<div class="card-savings">~${sv}% cheaper than PAYG</div>` : ""}
      </div>
      <div class="card">
        <div class="card-label">Yearly</div>
        <div class="card-price">${fmt(yearly)}<span class="card-period">/yr</span></div>
      </div>
      <div class="card">
        <div class="card-label">Daily</div>
        <div class="card-price">${fmt(daily)}<span class="card-period">/day</span></div>
      </div>
      ${model !== "payg" ? `<div class="card">
        <div class="card-label">PAYG (comparison)</div>
        <div class="card-price">${fmt(match.payg)}<span class="card-period">/mo</span></div>
      </div>` : ""}
    </div>
    <hr class="divider" />
    <p class="footer-note">All prices are net EUR. Data: Azure pricing (Easv5-series, Ubuntu, West Europe, March 2025).</p>
  `;

  setTimeout(sendHeight, 50);
}

calculate();

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
</script>
</body>
</html>
